<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galaxy English - Alphabet Order Complete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --wall-color: #f9f5eb;
            --chalkboard: #6a9a7a;
            --wood-frame: #cfa381;
            --wood-shadow: #a67c5b;
            
            /* שולחנות פסטל חלביים */
            --desk-blue: #a2d2ff;
            --desk-blue-shadow: #82b6e6;
            --desk-yellow: #fef4a9;
            --desk-yellow-shadow: #ded48a;
            --desk-green: #b9fbc0;
            --desk-green-shadow: #98db9f;
            --desk-orange: #ffcab0;
            --desk-orange-shadow: #e0ab92;
            
            --correct-pastel: #c3f3c7;
            --correct-pastel-shadow: #a1d1a5;
            --wrong-pastel: #ffccd5;
            --wrong-pastel-shadow: #dba2ac;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Secular One', 'Comfortaa', cursive; 
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            margin: 0; background-color: var(--wall-color); color: #614d3c;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .classroom-decor { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .decor-clock { position: absolute; top: 25px; left: 10%; width: 45px; height: 45px; border: 4px solid var(--wood-frame); border-radius: 50%; background: white; box-shadow: 0 3px 0 var(--wood-shadow); display: flex; align-items: center; justify-content: center; }
        .decor-clock::after { content: "🕒"; font-size: 1.1rem; opacity: 0.4; }
        .decor-shelf { position: absolute; top: 90px; left: 2%; width: 70px; height: 10px; background: var(--wood-frame); border-bottom: 3px solid var(--wood-shadow); border-radius: 4px; }
        .decor-shelf::before { content: "🌵📚"; font-size: 1.1rem; position: absolute; bottom: 6px; left: 5px; opacity: 0.8; }

        .galaxy-logo {
            position: absolute; top: 20px; right: 25px; z-index: 10;
            font-family: 'Secular One', sans-serif; font-size: 1.5rem; color: #518cca;
            text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.04);
        }
        .galaxy-logo span { color: #f2c94c; display: block; font-size: 1rem; text-align: right; margin-top: 1px; }

        .floating-home {
            position: fixed; top: 20px; left: 20px; background: #fffcf5; border: 3px solid #d4be9f;
            padding: 8px 20px; border-radius: 20px; color: #7a6146; font-weight: bold; box-shadow: 0 5px 0 #d4be9f;
            z-index: 9999; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 1rem;
        }
        .floating-home:active { transform: translateY(3px); box-shadow: 0 2px 0 #d4be9f; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px; padding-top: 95px; z-index: 5; }

        .chalkboard-area {
            background-color: var(--chalkboard); border: 14px solid var(--wood-frame); border-bottom: 20px solid var(--wood-frame); border-radius: 6px;
            width: 100%; max-width: 580px; height: 210px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 10px 0 rgba(0,0,0,0.06), inset 0 0 40px rgba(0,0,0,0.25); margin-bottom: 10px;
        }
        .chalkboard-area::after { content: ""; position: absolute; bottom: -20px; left: 40px; width: 30px; height: 6px; background: #fff; opacity: 0.6; border-radius: 2px; }
        
        .chalk-text { color: #fcfbf7; font-family: 'Comfortaa', 'Secular One', cursive; text-align: center; }
        .question-word { font-size: 4.5rem; font-weight: 700; direction: ltr; text-shadow: 2px 2px 0px rgba(0,0,0,0.12); letter-spacing: 5px; }
        .image-display { font-size: 5.8rem; line-height: 1; }
        .chalk-instruction { color: rgba(255,255,255,0.75); font-size: 1.4rem; margin-bottom: 5px; font-weight: bold; }

        .tools-area { position: absolute; bottom: -55px; display: flex; gap: 15px; }
        .speak-btn { background: var(--desk-yellow); border: 2px solid #fffdf0; width: 55px; height: 55px; border-radius: 50%; color: #614d3c; font-size: 1.8rem; cursor: pointer; box-shadow: 0 5px 0 var(--desk-yellow-shadow); }
        .speak-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--desk-yellow-shadow); }
        .back-btn { background: white; border: 2px solid #e0dfdb; width: 55px; height: 55px; border-radius: 50%; color: #9c9a95; font-size: 1.6rem; cursor: pointer; box-shadow: 0 5px 0 #d1d0cb; }
        .back-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 #d1d0cb; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 20px; width: 100%; max-width: 500px; margin-top: 50px; }
        
        .option-btn {
            border: 4px solid rgba(255,255,255,0.6); border-top-color: rgba(255,255,255,0.9); padding: 15px 10px; font-size: 2.2rem;
            border-radius: 26px; cursor: pointer; font-weight: 700; color: #524336; transition: transform 0.05s, box-shadow 0.05s; position: relative;
        }
        
        .desk-0 { background: var(--desk-blue); box-shadow: 0 12px 0 var(--desk-blue-shadow), 0 8px 12px rgba(0,0,0,0.05); }
        .desk-0:active { transform: translateY(7px); box-shadow: 0 5px 0 var(--desk-blue-shadow); }
        .desk-1 { background: var(--desk-yellow); box-shadow: 0 12px 0 var(--desk-yellow-shadow), 0 8px 12px rgba(0,0,0,0.05); }
        .desk-1:active { transform: translateY(7px); box-shadow: 0 5px 0 var(--desk-yellow-shadow); }
        .desk-2 { background: var(--desk-green); box-shadow: 0 12px 0 var(--desk-green-shadow), 0 8px 12px rgba(0,0,0,0.05); }
        .desk-2:active { transform: translateY(7px); box-shadow: 0 5px 0 var(--desk-green-shadow); }
        .desk-3 { background: var(--desk-orange); box-shadow: 0 12px 0 var(--desk-orange-shadow), 0 8px 12px rgba(0,0,0,0.05); }
        .desk-3:active { transform: translateY(7px); box-shadow: 0 5px 0 var(--desk-orange-shadow); }

        .desk-glow { filter: drop-shadow(0px 0px 8px rgba(255,255,255,0.8)); box-shadow: 0 12px 0 var(--desk-blue-shadow), 0 0 18px rgba(162, 210, 255, 0.4); }

        .option-btn.correct { background: var(--correct-pastel) !important; color: #385e3c; box-shadow: 0 12px 0 var(--correct-pastel-shadow) !important; filter: none; }
        .option-btn.wrong { background: var(--wrong-pastel) !important; color: #7d444e; box-shadow: 0 12px 0 var(--wrong-pastel-shadow) !important; filter: none; }

        /* תפריט ראשי גמיש וריספונסיבי */
        .menu-container { width: 100%; max-width: 650px; display: flex; justify-content: center; margin-top: 35px; }
        .menu-flex { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; }

        .menu-desk {
            flex: 1 1 calc(50% - 12px); max-width: 115px; aspect-ratio: 1 / 0.9; border-radius: 22px; 
            border: 3px solid rgba(255,255,255,0.5); color: #524336; cursor: pointer; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 6px;
        }
        
        .m-desk-0 { background: var(--desk-blue); box-shadow: 0 6px 0 var(--desk-blue-shadow); }
        .m-desk-1 { background: var(--desk-orange); box-shadow: 0 6px 0 var(--desk-orange-shadow); }
        .m-desk-2 { background: var(--desk-yellow); box-shadow: 0 6px 0 var(--desk-yellow-shadow); }
        .m-desk-3 { background: var(--desk-green); box-shadow: 0 6px 0 var(--desk-green-shadow); }
        .m-desk-4 { background: white; box-shadow: 0 6px 0 #ccc; border-color: #eee; }

        .menu-desk i { font-size: 1.5rem; margin-bottom: 2px; }
        .menu-desk span { font-size: 0.85rem; font-weight: bold; line-height: 1.1; }

        @media (min-width: 580px) {
            .menu-desk { flex: 1 1 calc(20% - 12px); max-width: 110px; }
        }

        #progress-map { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(14px, 1fr)); gap: 5px; padding: 10px; max-height: 80px; overflow-y: auto; direction: ltr; background: rgba(249, 245, 235, 0.8); border-top: 3px solid var(--wood-frame); position: fixed; bottom: 0; left: 0; z-index: 10; }
        .dot { height: 12px; border-radius: 3px; background: rgba(0,0,0,0.06); }
        .dot.active { background: var(--wood-frame); transform: scale(1.2); }
        .dot.done { background: var(--correct-pastel); }

        .screen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--wall-color); z-index: 9000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .hidden { display: none !important; }
        .report-link { color: var(--wood-shadow); font-weight: bold; cursor: pointer; text-decoration: underline; font-size: 1rem; z-index: 10; margin-top: 25px; }
        .mistake-item { border-bottom: 2px solid rgba(0,0,0,0.03); padding: 8px 0; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="classroom-decor">
        <div class="decor-clock"></div>
        <div class="decor-shelf"></div>
    </div>

    <div id="home-anchor" class="hidden">
        <div class="floating-home" onclick="resetToMenu()">🏠 חזרה לכיתה</div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="galaxy-logo">GALAXY<span>ENGLISH ⭐</span></div>
        
        <div style="background: var(--chalkboard); border: 12px solid var(--wood-frame); border-bottom-width: 16px; padding: 16px 30px; border-radius: 6px; margin-bottom: 10px; box-shadow: 0 6px 0 rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 500px;">
            <h1 style="color: white; margin: 0; font-size: 1.9rem; letter-spacing: 1px;">ברוכים הבאים לשיעור אנגלית! 🍎</h1>
        </div>

        <div class="menu-container">
            <div class="menu-flex">
                <div class="menu-desk m-desk-0" onclick="start('abc')">
                    <i>🅰️</i>
                    <span>שלב 1:<br>אותיות ABC</span>
                </div>
                <div class="menu-desk m-desk-1" onclick="start('sequence')">
                    <i>🧩</i>
                    <span>שלב 2:<br>סדר ה-ABC</span>
                </div>
                <div class="menu-desk m-desk-2" onclick="start('images')">
                    <i>🖼️</i>
                    <span>שלב 3:<br>זיהוי תמונה</span>
                </div>
                <div class="menu-desk m-desk-3" onclick="start('blending')">
                    <i>🎓</i>
                    <span>שלב 4:<br>לימוד קריאה</span>
                </div>
                <div class="menu-desk m-desk-4" onclick="start('all')">
                    <i>📖</i>
                    <span>שלב 5:<br>כל המילים</span>
                </div>
            </div>
        </div>
        
        <div class="report-link" onclick="showReport()">📊 יומן למידה להורים</div>
    </div>

    <div id="report-screen" class="screen hidden">
        <h2 style="color: var(--wood-shadow); font-size: 1.8rem; margin-bottom: 5px;">📋 יומן טעויות לחיזוק</h2>
        <div id="log-content" style="background:white; padding:20px; border-radius:20px; width:100%; max-width:420px; max-height:50vh; overflow-y:auto; margin-bottom:20px; text-align:right; border: 4px solid var(--wood-frame); color: #6b5641;"></div>
        <button class="floating-home" style="position: static; background: #c3f3c7; border-color: #93c497; box-shadow: 0 5px 0 #73a477; color: #2e5924; width: 220px; justify-content: center; margin-bottom: 15px;" onclick="sendWhatsApp()">שלח דוח לוואטסאפ</button>
        <button style="background: var(--wood-frame); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 var(--wood-shadow);" onclick="secureReset()">🗑️ איפוס יומן הטעויות</button>
        <div class="report-link" onclick="closeReport()">❌ סגור חלונית</div>
    </div>

    <main>
        <div class="chalkboard-area">
            <div id="instruction-title" class="chalk-text chalk-instruction">מה הפירוש בעברית?</div>
            <div id="q-word" class="chalk-text question-word">?</div>
            
            <div class="tools-area">
                <button id="prev-btn" class="back-btn" onclick="goBack()">⬅️</button>
                <button id="audio-btn" class="speak-btn" onclick="speak()">🔊</button>
            </div>
        </div>

        <div id="options" class="options-grid"></div>
    </main>

    <div id="progress-map"></div>

    <script>
        let currentMode = ''; let currentSet = []; let idx = 0;
        let mistakes = JSON.parse(localStorage.getItem('eng_classroom_exact_v1') || "{}");

        const banks = {
            abc: [
                {q: "A", a: "אַ", distractors: ["ב", "ג", "ד"]}, {q: "B", a: "בּ", distractors: ["ד", "ס", "מ"]},
                {q: "C", a: "כּ/ס", distractors: ["ג", "ז", "ל"]}, {q: "D", a: "ד", distractors: ["ת", "ב", "נ"]},
                {q: "E", a: "אֶ", distractors: ["ו", "י", "מ"]}, {q: "F", a: "פ / ף", distractors: ["ב", "ג", "ש"]},
                {q: "G", a: "ג", distractors: ["ז", "ס", "ח"]}, {q: "H", a: "ה/ח", distractors: ["ע", "צ", "ט"]},
                {q: "I", a: "אִי", distractors: ["אוֹ", "ה", "ל"]}, {q: "J", a: "ג'", distractors: ["ז", "ד", "צ"]},
                {q: "K", a: "כּ/ק/ך", distractors: ["ס", "מ", "ר"]}, {q: "L", a: "ל", distractors: ["נ", "ר", "מ"]},
                {q: "M", a: "מ / ם", distractors: ["נ", "ב", "פ"]}, {q: "N", a: "נ / ן", distractors: ["מ", "ז", "ח"]},
                {q: "O", a: "אוֹ", distractors: ["א", "י", "ק"]}, {q: "P", a: "פּ / ף", distractors: ["ב", "ט", "ד"]},
                {q: "Q", a: "ק", distractors: ["ס", "פ", "מ"]}, {q: "R", a: "ר", distractors: ["ל", "נ", "ז"]},
                {q: "S", a: "ס", distractors: ["ז", "ח", "ש"]}, {q: "T", a: "ט/ת", distractors: ["ד", "ס", "פ"]},
                {q: "U", a: "אַ/אוּ", distractors: ["אוֹ", "אֶ", "אִי"]}, {q: "V", a: "ו/ב", distractors: ["ז", "ח", "ש"]},
                {q: "W", a: "ו", distractors: ["י", "מ", "ס"]}, {q: "X", a: "קְס", distractors: ["ז", "ס", "צ"]},
                {q: "Y", a: "י/אִי", distractors: ["ו", "מ", "ל"]}, {q: "Z", a: "ז", distractors: ["צ", "ס", "ג"]}
            ],
            // 🧩 בנק הרצפים החדש: הילד משלים את האות החסרה לפי הסדר הכרונולוגי של ה-ABC
            sequence: [
                {q: "A B _", a: "C", distractors: ["D", "E", "F"]},
                {q: "B _ D", a: "C", distractors: ["A", "E", "M"]},
                {q: "_ D E", a: "C", distractors: ["B", "F", "G"]},
                {q: "D E _", a: "F", distractors: ["G", "H", "C"]},
                {q: "G _ I", a: "H", distractors: ["J", "F", "K"]},
                {q: "J K _", a: "L", distractors: ["M", "N", "O"]},
                {q: "L _ N", a: "M", distractors: ["O", "K", "P"]},

                {q: "P Q _", a: "R", distractors: ["S", "T", "O"]},

                {q: "S T _", a: "U", distractors: ["V", "W", "R"]},
                {q: "_ V W", a: "U", distractors: ["T", "X", "Y"]},
                {q: "V W _", a: "X", distractors: ["Y", "Z", "U"]},
                {q: "W _ Y", a: "X", distractors: ["Z", "V", "T"]},
                {q: "X Y _", a: "Z", distractors: ["W", "V", "A"]}
            ],
            images: [
                {q: "☀️", a: "Sun", distractors: ["Cloud", "Rain", "Snow"]}, {q: "🐱", a: "Cat", distractors: ["Dog", "Pig", "Fox"]},
                {q: "🐶", a: "Dog", distractors: ["Cat", "Hen", "Bus"]}, {q: "🍦", a: "Ice cream", distractors: ["Cake", "Apple", "Store"]},
                {q: "👢", a: "Boots", distractors: ["Shoes", "Socks", "Coat"]}, {q: "🧥", a: "Coat", distractors: ["Dress", "Shirt", "Boots"]},
                {q: "👗", a: "Dress", distractors: ["Shirt", "Coat", "Socks"]}, {q: "🧦", a: "Socks", distractors: ["Shoes", "Boots", "Pants"]},
                {q: "🌳", a: "Tree", distractors: ["Wall", "Sky", "Home"]}, {q: "☁️", a: "Cloud", distractors: ["Sun", "Rain", "Sky"]},

                {q: "🏠", a: "Home", distractors: ["Park", "Store", "Wall"]}, {q: "🛏️", a: "Bed", distractors: ["Home", "Bag", "Cup"]},
                {q: "👜", a: "Bag", distractors: ["Pen", "Hat", "Map"]}, {q: "✏️", a: "Pen", distractors: ["Bag", "Map", "Cup"]}
            ],
            blending: [
                {q: "Cat", a: "חתול", distractors: ["כלב", "עץ", "מיטה"]}, {q: "Dog", a: "כלב", distractors: ["חתול", "ענן", "גלידה"]},
                {q: "Sun", a: "שמש", distractors: ["ירח", "בית", "ענן"]}, {q: "Big", a: "גדול", distractors: ["קטן", "קרוב", "יפה"]},

                {q: "Coat", a: "מעיל", distractors: ["חולצה", "שמלה", "מכנסיים"]}, {q: "Autumn", a: "סתיו", distractors: ["אביב", "קיץ", "חורף"]},
                {q: "Spring", a: "אביב", distractors: ["קיץ", "חורף", "סתיו"]}, {q: "Summer", a: "קיץ", distractors: ["אביב", "חורף", "סתיו"]},
                {q: "Winter", a: "חורף", distractors: ["קיץ", "סתיו", "אביב"]}, {q: "Cloud", a: "ענן", distractors: ["שמש", "גשם", "רוח"]},
                {q: "Rain", a: "גשם", distractors: ["שלג", "שמש", "ענן"]}, {q: "Snow", a: "שלג", distractors: ["גשם", "שמש", "רוח"]},
                {q: "Sky", a: "שמיים", distractors: ["אדמה", "ים", "ענן"]}, {q: "Sunny", a: "שטוף שמש", distractors: ["גשום", "מעונן", "קר"]},
                {q: "Cold", a: "קר", distractors: ["חם", "נעים", "יבש"]}, {q: "Warm", a: "חמים", distractors: ["קר", "קפוא", "לוהט"]},
                {q: "Father", a: "אבא", distractors: ["אמא", "אח", "סבא"]}, {q: "Mother", a: "אמא", distractors: ["אבא", "אחות", "סבתא"]},
                {q: "Children", a: "ילדים", distractors: ["הורים", "חברים", "מורים"]}, {q: "They", a: "הם/הן", distractors: ["אנחנו", "אתם", "הוא"]},
                {q: "We", a: "אנחנו", distractors: ["הם", "אתם", "אני"]}, {q: "Who", a: "מי", distractors: ["מה", "איפה", "למה"]},
                {q: "Climb", a: "לטפס", distractors: ["לרוץ", "לקפוץ", "לישון"]}, {q: "Eat", a: "לאכול", distractors: ["לשתות", "לבשל", "לקנות"]},
                {q: "Sleep", a: "לישון", distractors: ["לקרוא", "לעמוד", "לשבת"]}, {q: "Play", a: "לשחק", distractors: ["לעבוד", "ללמוד", "לכתוב"]},
                {q: "Read a book", a: "לקרוא ספר", distractors: ["לכתוב", "לצייר", "לשיר"]}, {q: "Fly a kite", a: "להעיף עפיפון", distractors: ["לשחק בכדור", "לשחות", "לרקוד"]},
                {q: "Wear", a: "ללבוש", distractors: ["לקנות", "לראות", "לעשות"]}, {q: "Stand", a: "לעמוד", distractors: ["לשבת", "לרוץ", "ללכת"]},
                {q: "Come", a: "לבוא", distractors: ["ללכת", "לרוץ", "לעוף"]}, {q: "Make", a: "להכין", distractors: ["לקנות", "לשבור", "לקחת"]},
                {q: "Home", a: "בית", distractors: ["פארק", "חנות", "בריכה"]}, {q: "Park", a: "פארק", distractors: ["בית", "חנות", "בריכה"]},
                {q: "Pool", a: "בריכה", distractors: ["ים", "פארק", "בית"]}, {q: "Store", a: "חנות", distractors: ["בית", "פארק", "בריכה"]},
                {q: "Tree", a: "עץ", distractors: ["פרח", "דשא", "אבן"]}, {q: "Wall", a: "קיר", distractors: ["דלת", "חלון", "רצפה"]},
                {q: "Picture", a: "תמונה", distractors: ["ספר", "שולחן", "כיסא"]}, {q: "Eyes", a: "עיניים", distractors: ["אוזניים", "פה", "אף"]},
                {q: "Mouth", a: "פה", distractors: ["עיניים", "אוזניים", "אף"]}, {q: "Nose", a: "אף", distractors: ["עיניים", "אוזניים", "פה"]},
                {q: "Ice cream", a: "גלידה", distractors: ["עוגה", "פיצה", "שוקולד"]}, {q: "Basketball", a: "כדורסל", distractors: ["כדורגל", "טניס", "ריצה"]},
                {q: "Game", a: "משחק", distractors: ["סרט", "שיר", "ספר"]}, {q: "Funny", a: "מצחיק", distractors: ["עצוב", "גדול", "קטן"]},
                {q: "Near", a: "קרוב", distractors: ["רחוק", "מעל", "מתחת"]}, {q: "Old", a: "ישן/זקן", distractors: ["חדש", "צעיר", "יפה"]},
                {q: "Okay", a: "בסדר", distractors: ["לא", "כן", "אולי"]}, {q: "Too", a: "גם/מדי", distractors: ["אבל", "רק", "כאן"]},
                {q: "Beautiful", a: "יפה", distractors: ["מכוער", "גדול", "חכם"]}, {q: "Good for you", a: "כל הכבוד", distractors: ["תודה", "בבקשה", "סליחה"]}
            ]
        };

        function start(mode) {
            currentMode = mode; currentSet = banks[mode];
            const savedIdx = localStorage.getItem('saved_classroom_exact_' + mode);
            if (savedIdx && parseInt(savedIdx) > 0 && parseInt(savedIdx) < currentSet.length) {
                if (confirm("רוצה להמשיך מהמקום שעצרת?")) idx = parseInt(savedIdx);
                else idx = 0;
            } else idx = 0;

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('home-anchor').classList.remove('hidden');
            
            const instTitle = document.getElementById('instruction-title');
            if(mode === 'abc') instTitle.innerText = "מה הצליל של האות?";
            else if(mode === 'sequence') instTitle.innerText = "איזו אות משלימה את הסדר?";
            else if(mode === 'images') instTitle.innerText = "מה המילה באנגלית?";
            else instTitle.innerText = "מה הפירוש בעברית?";

            const qEl = document.getElementById('q-word');
            qEl.className = (mode === 'images') ? "chalk-text image-display" : "chalk-text question-word";

            initProgress();
            for(let i=0; i<idx; i++) document.getElementById('dot-'+i).classList.add('done');
            loadNext();
        }

        function resetToMenu() {
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('home-anchor').classList.add('hidden');
            currentMode = '';
        }

        function initProgress() {
            const map = document.getElementById('progress-map'); map.innerHTML = "";
            currentSet.forEach((_, i) => {
                const d = document.createElement('div'); d.className = 'dot'; d.id = 'dot-'+i;
                map.appendChild(d);
            });
        }

        function loadNext() {
            const item = currentSet[idx];
            document.getElementById('q-word').innerText = item.q;
            document.getElementById('prev-btn').disabled = (idx === 0);
            localStorage.setItem('saved_classroom_exact_' + currentMode, idx);

            let choices = [item.a, ...item.distractors].sort(() => Math.random() - 0.5);
            const optionsDiv = document.getElementById('options'); optionsDiv.innerHTML = "";
            
            choices.forEach((choice, i) => {
                const btn = document.createElement('button');
                const glowClass = (i === 0) ? 'desk-glow' : '';
                btn.className = `option-btn desk-${i} ${glowClass}`; 
                btn.innerText = choice;
                btn.onclick = () => check(choice, btn);
                optionsDiv.appendChild(btn);
            });
            updateDots();
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.remove('active'); if (i === idx) d.classList.add('active');
            });
        }

        function goBack() {
            if (idx > 0) {
                idx--; document.getElementById('dot-'+idx).classList.remove('done'); loadNext();
            }
        }

        function check(choice, btn) {
            const correct = currentSet[idx].a; const word = currentSet[idx].q;
            
            if(choice === correct) {
                btn.className = 'option-btn correct'; 
                document.getElementById('dot-'+idx).classList.add('done');
                idx++;
                setTimeout(() => {
                    if(idx < currentSet.length) loadNext();
                    else { 
                        localStorage.removeItem('saved_classroom_exact_' + currentMode);
                        alert("השיעור הושלם בהצלחה! 🌟 חוזרים לכיתה."); resetToMenu(); 
                    }
                }, 600);
            } else {
                btn.className = 'option-btn wrong'; 
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                const logKey = (currentMode === 'images') ? `תמונה של ${correct}` : word;
                if(!mistakes[logKey]) mistakes[logKey] = { count: 0, lastTime: "", correct: correct };
                mistakes[logKey].count++; mistakes[logKey].lastTime = timeStr;
                localStorage.setItem('eng_classroom_exact_v1', JSON.stringify(mistakes));
            }
        }

        function speak() {
            window.speechSynthesis.cancel(); 
            let wordToSpeak = currentSet[idx].q;
            
            // בשלבים אלו נרצה להקריא את התשובה הנכונה עצמה או את האות הבודדת
            if (currentMode === 'sequence' || currentMode === 'images') {
                wordToSpeak = currentSet[idx].a;
            }

            if (currentMode === 'abc' || currentMode === 'sequence') {
                const msgIntro = new SpeechSynthesisUtterance("Letter");
                msgIntro.lang = 'en-US'; msgIntro.rate = 0.6; window.speechSynthesis.speak(msgIntro);
                setTimeout(() => {
                    const msg1 = new SpeechSynthesisUtterance(wordToSpeak);
                    msg1.lang = 'en-US'; msg1.rate = 0.4; window.speechSynthesis.speak(msg1);
                }, 600);
            } else if (currentMode === 'blending') {
                const letters = wordToSpeak.split('');
                letters.forEach((letter, i) => {
                    setTimeout(() => {
                        const msgLetter = new SpeechSynthesisUtterance(letter);
                        msgLetter.lang = 'en-US'; msgLetter.rate = 0.45; window.speechSynthesis.speak(msgLetter);
                    }, i * 900); 
                });
                setTimeout(() => {
                    const msgFull = new SpeechSynthesisUtterance(wordToSpeak);
                    msgFull.lang = 'en-US'; msgFull.rate = 0.4; window.speechSynthesis.speak(msgFull);
                }, letters.length * 950);
            } else {
                const msg = new SpeechSynthesisUtterance(wordToSpeak);
                msg.lang = 'en-US'; msg.rate = 0.4; window.speechSynthesis.speak(msg);
            }
        }

        function showReport() {
            const log = document.getElementById('log-content'); log.innerHTML = "";
            const keys = Object.keys(mistakes);
            if(keys.length === 0) log.innerHTML = "🌟 הלוח נקי! אין טעויות ביומן.";
            else {
                keys.forEach(word => {
                    const m = mistakes[word];
                    log.innerHTML += `<div class="mistake-item"><b>${word}</b><br>טעויות: ${m.count} | פעם אחרונה: ${m.lastTime}</div>`;
                });
            }
            document.getElementById('report-screen').classList.remove('hidden');
        }

        function secureReset() {
            if (prompt("הכנס קוד הורים:") === "4567") {
                mistakes = {}; localStorage.removeItem('eng_classroom_exact_v1'); showReport();
            } else alert("קוד שגוי!");
        }

        function closeReport() { document.getElementById('report-screen').classList.add('hidden'); }

        function sendWhatsApp() {
            let text = "דוח למידה - Galaxy English 📚\n";
            Object.keys(mistakes).forEach(word => {
                const m = mistakes[word]; text += `- ${word}: ${m.count} טעויות (${m.lastTime})\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
